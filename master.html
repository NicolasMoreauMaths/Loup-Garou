<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Meneur — Loup-Garou</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    .master-player { cursor: pointer; transition: all 0.2s; }
    .master-player:hover { border-color: var(--red); background: rgba(192,57,43,0.08); }
    .master-player.dead { opacity: 0.5; cursor: default; }
    .master-player.dead:hover { border-color: var(--border); background: var(--bg); }

    .guide-card {
      width: 100%; max-width: 420px;
      background: rgba(10,10,30,0.9);
      border: 1px solid #3a3a6a;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 24px rgba(0,0,80,0.4);
    }
    .guide-title {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8888cc;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .guide-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .guide-step {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      border-left: 3px solid #4444aa;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.4;
    }
    .guide-step.current {
      background: rgba(100,100,255,0.1);
      border-left-color: #8888ff;
      color: white;
    }
    .guide-step.done {
      opacity: 0.4;
      text-decoration: line-through;
    }
    .guide-step .step-num {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      color: #6666aa;
      min-width: 20px;
      padding-top: 1px;
    }
    .guide-step.current .step-num { color: #aaaaff; }

    .guide-day {
      border-left-color: #aa8800;
    }
    .guide-day.current {
      background: rgba(200,146,42,0.1);
      border-left-color: var(--accent2);
    }
    .guide-day .step-num { color: #886600; }
    .guide-day.current .step-num { color: var(--accent2); }
  </style>
</head>
<body>
  <div class="moon"></div>
  <div class="page" style="gap:16px;">

    <div style="width:100%;max-width:420px;display:flex;align-items:center;gap:12px;">
      <div style="font-size:2rem;">🐺</div>
      <div>
        <h1 style="font-family:'Cinzel',serif;font-size:1.3rem;color:var(--accent2);">Vue Meneur</h1>
        <p style="color:var(--text2);font-size:0.85rem;font-style:italic;">Toi seul vois les rôles de tous.</p>
      </div>
    </div>

    <div id="phase-banner" class="phase-banner phase-night" style="width:100%;max-width:420px;">🌙 Nuit 1</div>
    <div id="win-banner" class="alert alert-success hidden" style="width:100%;max-width:420px;font-size:1.1rem;padding:16px;"></div>

    <!-- Guide du meneur -->
    <div class="guide-card" id="guide-card">
      <div class="guide-title">📋 Guide — que faire maintenant ?</div>
      <div class="guide-steps" id="guide-steps">
        <!-- rempli dynamiquement -->
      </div>
    </div>

    <!-- Stats rapides -->
    <div class="card" style="padding:16px 20px;">
      <div class="info-row">
        <span class="label">👥 Joueurs vivants</span>
        <span class="value" id="stat-alive">—</span>
      </div>
      <div class="info-row">
        <span class="label">🐺 Loups vivants</span>
        <span class="value" id="stat-wolves" style="color:var(--red2);">—</span>
      </div>
      <div class="info-row">
        <span class="label">🧑‍🌾 Village vivant</span>
        <span class="value" id="stat-village" style="color:var(--green2);">—</span>
      </div>
    </div>

    <!-- Liste des joueurs -->
    <div class="card">
      <h2>🎭 Joueurs et rôles</h2>
      <div id="master-player-list">
        <div class="waiting"><div class="spinner"></div><span>Chargement…</span></div>
      </div>
      <p style="color:var(--text3);font-size:0.8rem;font-style:italic;text-align:center;margin-top:12px;">
        Appuie sur un joueur pour l'éliminer
      </p>
    </div>

    <!-- Actions -->
    <div class="card">
      <h2>⚡ Actions</h2>
      <div class="btn-gap">
        <button class="btn btn-primary" onclick="nextPhase()">
          🌙 Passer à la phase suivante
        </button>
        <button class="btn btn-danger" onclick="endGame()">
          🏁 Terminer la partie
        </button>
      </div>
    </div>

    <!-- Rappel des rôles -->
    <div class="card">
      <h2>📖 Rappel des rôles</h2>
      <div id="roles-reminder"></div>
    </div>

    <div style="height:32px;"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
  <script>
    initMaster();

    // ── Guide dynamique basé sur les rôles réellement actifs ─────
    function buildGuideSteps(room) {
      const phase = room.phase || 'night';
      const day = room.day || 1;
      const players = room.players ? Object.values(room.players) : [];
      const aliveRoles = new Set(players.filter(p => p.alive !== false && p.role).map(p => p.role));
      const has = role => aliveRoles.has(role);

      if (phase === 'night') {
        const steps = [
          { text: "Demande à tout le monde de fermer les yeux et de baisser la tête.", current: true },
        ];

        // Nuit 1 uniquement
        if (day === 1) {
          if (has('cupid'))
            steps.push({ text: "💘 Cupidon : « Ouvre les yeux. Désigne tes deux amoureux en silence. Referme les yeux. »" });
          if (has('wild_child'))
            steps.push({ text: "🌿 Enfant Sauvage : « Ouvre les yeux. Désigne ton modèle en silence. Referme les yeux. »" });
          if (has('wolf_dog'))
            steps.push({ text: "🐕 Chien-Loup : « Ouvre les yeux. Choisis ton camp : 👍 village ou 👎 loup. Referme les yeux. »" });
          if (has('actor'))
            steps.push({ text: "🎭 Comédien : « Ouvre les yeux. Désigne une carte parmi les 3 proposées. Referme les yeux. »" });
        }

        if (has('seer'))
          steps.push({ text: "🔮 Voyante : « Ouvre les yeux. Désigne un joueur. » → 👍 village / 👎 loup. « Referme les yeux. »" });

        if (has('fox'))
          steps.push({ text: "🦊 Renard : « Ouvre les yeux. Désigne 3 joueurs consécutifs. » → Oui si loup parmi eux, non sinon (il perd son pouvoir si non). « Referme les yeux. »" });

        const wolfPlayers = players.filter(p => p.alive !== false && isWolfRole(p.role));
        if (wolfPlayers.length > 0)
          steps.push({ text: "🐺 Loups : « Loups-Garous, ouvrez les yeux. Reconnaissez-vous. Désignez une victime en silence. » → Mémorise le choix. « Refermez les yeux. »" });

        if (has('big_bad_wolf'))
          steps.push({ text: "😈 Grand Méchant Loup : peut désigner une 2e victime supplémentaire si aucun loup n'a encore été éliminé." });

        if (has('healer'))
          steps.push({ text: "🛡️ Salvateur : « Ouvre les yeux. Désigne un joueur à protéger cette nuit (pas le même qu'hier). Referme les yeux. »" });

        if (has('witch'))
          steps.push({ text: "🧙‍♀️ Sorcière : « Ouvre les yeux. » → Montre-lui la victime. « Potion de vie ? (👍) Potion de mort ? (désigne quelqu'un) Referme les yeux. »" });

        if (has('pyromaniac'))
          steps.push({ text: "🔥 Pyromane : « Ouvre les yeux. Désigne un joueur à asperger, OU craque l'allumette pour tuer tous les aspergés. Referme les yeux. »" });

        if (has('little_girl'))
          steps.push({ text: "⚠️ La Petite Fille peut espionner les loups. Si un loup la signale, elle est éliminée à la place de la victime prévue." });

        steps.push({ text: "« Tout le monde ouvre les yeux. Il fait jour. » → Annonce les éliminés et clique sur leur nom dans l'app." });
        return steps;

      } else {
        // Journée
        const steps = [
          { text: "Annonce les victimes de la nuit. Clique sur ☠️ à côté de leur nom pour les éliminer.", current: true },
        ];

        if (has('bear'))
          steps.push({ text: "🐻 Montreur d'Ours : grogne si l'un de ses voisins immédiats (gauche ou droite) est un loup." });

        steps.push({ text: "Lance le débat : « Qui soupçonnez-vous d'être un Loup-Garou ? Vous avez quelques minutes pour argumenter. »" });

        if (has('hunter'))
          steps.push({ text: "⚠️ Si le Chasseur est éliminé : il désigne immédiatement sa cible à voix haute → clique aussi sur ☠️ pour cette cible." });

        if (has('stuttering_judge'))
          steps.push({ text: "⚠️ Le Juge Bègue peut faire son signe secret convenu pour provoquer un 2e vote." });

        if (has('devoted_servant'))
          steps.push({ text: "⚠️ La Servante Dévouée peut révéler sa carte avant l'élimination pour prendre la place du joueur voté." });

        steps.push({ text: "Vote : « Levez la main pour voter contre... » → La majorité l'emporte. Clique sur ☠️ pour le joueur voté et révèle son rôle à voix haute." });
        steps.push({ text: "Passe à la nuit suivante avec le bouton « Phase suivante »." });
        return steps;
      }
    }

    function updateGuide(room) {
      const phase = room.phase || 'night';
      const steps = buildGuideSteps(room);
      const container = document.getElementById('guide-steps');
      if (!container) return;
      const isNight = phase === 'night';
      container.innerHTML = steps.map((s, i) => `
        <div class="guide-step ${s.current ? 'current' : ''} ${isNight ? '' : 'guide-day'}">
          <span class="step-num">${i + 1}.</span>
          <span>${s.text}</span>
        </div>
      `).join('');

      const card = document.getElementById('guide-card');
      if (card) {
        card.style.borderColor = isNight ? '#3a3a6a' : '#6a5000';
        card.style.background = isNight ? 'rgba(10,10,30,0.9)' : 'rgba(20,15,0,0.9)';
      }
      const title = card?.querySelector('.guide-title');
      if (title) title.style.color = isNight ? '#8888cc' : '#cc9900';
    }

    // Hook sur renderMaster pour mettre à jour le guide et le rappel des rôles
    let reminderBuilt = false;
    const _origRenderMaster = window.renderMaster;
    window.renderMaster = function(room) {
      _origRenderMaster(room);
      updateGuide(room);

      // Rappel des rôles : uniquement les rôles actifs dans cette partie (construit une seule fois)
      if (!reminderBuilt && room.roles) {
        const activeKeys = Object.entries(room.roles).filter(([, v]) => v > 0).map(([k]) => k);
        const reminder = document.getElementById('roles-reminder');
        if (reminder && activeKeys.length > 0) {
          reminderBuilt = true;
          reminder.innerHTML = activeKeys.map(key => {
            const def = ROLES_DEF[key];
            if (!def) return '';
            return `
              <div class="info-row" onclick="this.querySelector('.rr-master').classList.toggle('hidden')" style="flex-direction:column;align-items:flex-start;cursor:pointer;gap:4px;">
                <div style="display:flex;align-items:center;gap:8px;width:100%;">
                  <span>${def.emoji} <strong style="font-family:'Cinzel',serif;font-size:0.85rem;">${def.name}</strong></span>
                  <span style="color:var(--text3);font-size:0.75rem;margin-left:auto;">▼ meneur</span>
                </div>
                <div class="rr-master hidden" style="font-size:0.82rem;color:#8888cc;padding:6px 8px;background:rgba(100,100,200,0.08);border-radius:8px;width:100%;line-height:1.4;">${def.master}</div>
              </div>
            `;
          }).join('');
        }
      }
    };

    // Boutons d'élimination dans la liste des joueurs (via délégation d'événements)
    const listEl = document.getElementById('master-player-list');
    listEl.addEventListener('click', e => {
      const btn = e.target.closest('.mp-elim-btn');
      if (!btn) return;
      const pid = btn.dataset.pid;
      const name = btn.dataset.name;
      if (confirm(`Éliminer ${name} ?`)) {
        eliminatePlayer(pid);
      }
    });
  </script>
</body>
</html>
