<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Loup-Garou</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
  <div class="moon"></div>
  <div class="page">

    <div class="logo">
      <div class="icon">🐺</div>
      <h1>Loup-Garou</h1>
      <p class="subtitle">Le jeu du village maudit</p>
    </div>

    <div class="card">
      <div id="error-msg" class="alert alert-error hidden"></div>

      <div class="input-group">
        <label for="player-name">Ton prénom</label>
        <input type="text" id="player-name" placeholder="Entre ton prénom…" maxlength="20" autocomplete="off" autocorrect="off">
      </div>

      <div class="sep"></div>

      <h2>Rejoindre une partie</h2>
      <div class="input-group">
        <label for="room-code">Code du salon</label>
        <input type="text" id="room-code" placeholder="Ex : ABCD" maxlength="4" autocomplete="off" autocorrect="off" autocapitalize="characters" style="font-family:'Cinzel',serif;font-size:1.4rem;letter-spacing:0.2em;text-align:center">
      </div>
      <div class="btn-gap">
        <button class="btn btn-primary" id="btn-join">
          🚪 Rejoindre le salon
        </button>
        <div class="divider">ou</div>
        <button class="btn btn-secondary" id="btn-create">
          ✨ Créer un salon
        </button>
      </div>

      <div class="sep"></div>

      <!-- Option 2 joueurs sur 1 appareil -->
      <div style="text-align:center;margin-bottom:6px;">
        <button type="button" id="btn-toggle-p2" style="background:none;border:none;color:var(--text3);font-size:0.9rem;cursor:pointer;font-family:'Crimson Text',serif;text-decoration:underline;padding:4px 0;" onclick="
          const sec = document.getElementById('p2-section');
          const hidden = sec.classList.toggle('hidden');
          this.textContent = hidden ? '👥 Nous sommes 2 sur cet appareil' : '👤 Un seul joueur sur cet appareil';
          if (hidden) document.getElementById('player-name-2').value = '';
        ">👥 Nous sommes 2 sur cet appareil</button>
      </div>
      <div id="p2-section" class="hidden">
        <div class="input-group" style="margin-bottom:0;">
          <label for="player-name-2">Prénom du 2e joueur</label>
          <input type="text" id="player-name-2" placeholder="Entre son prénom…" maxlength="20" autocomplete="off" autocorrect="off">
        </div>
        <p style="color:var(--text3);font-size:0.8rem;font-style:italic;text-align:center;margin-top:8px;">
          Chaque joueur verra son rôle en privé, l'un après l'autre.
        </p>
      </div>
    </div>

    <p style="color:var(--text3);font-size:0.8rem;text-align:center;font-style:italic;">
      Le créateur du salon est le meneur de jeu.
    </p>

  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
  <script>initHome();</script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
