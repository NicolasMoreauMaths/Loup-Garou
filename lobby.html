<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Salon — Loup-Garou</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Catégories de rôles ── */
    .role-category {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .cat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      background: var(--bg);
      cursor: pointer;
      gap: 10px;
      user-select: none;
    }
    .cat-header:hover { background: rgba(200,146,42,0.06); }
    .cat-info { flex: 1; }
    .cat-label {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      color: var(--accent2);
      display: block;
      margin-bottom: 2px;
    }
    .cat-desc {
      font-size: 0.78rem;
      color: var(--text3);
      font-style: italic;
      display: block;
    }
    .cat-meta { display: flex; align-items: center; gap: 8px; }
    .cat-count {
      background: var(--accent);
      color: #0a0a0f;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .cat-arrow { color: var(--text3); font-size: 0.8rem; }
    .cat-body { padding: 8px; background: var(--bg2); }

    /* ── Ligne de rôle améliorée ── */
    .rc-text { display: flex; flex-direction: column; }
    .rc-hint { font-size: 0.7rem; color: var(--text3); font-style: italic; }

    /* ── Panneau info rôle ── */
    .role-info-panel {
      margin: 0 8px 8px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .rip-player {
      font-size: 0.88rem;
      color: var(--text2);
      line-height: 1.4;
    }
    .rip-master {
      font-size: 0.88rem;
      color: #8888cc;
      line-height: 1.4;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="moon"></div>
  <div class="page">

    <!-- Header -->
    <div class="logo">
      <div class="icon" style="font-size:40px;">🐺</div>
      <h1 style="font-size:1.6rem;">Salle d'attente</h1>
    </div>

    <!-- Code du salon -->
    <div class="code-display" style="width:100%;max-width:420px;">
      <div class="code" id="room-code-display">····</div>
      <div class="code-label">Code du salon — partage-le avec les joueurs</div>
      <button id="btn-copy-code" class="btn btn-secondary btn-sm" style="margin-top:12px;width:auto;padding:8px 20px;" onclick="
        const code = document.getElementById('room-code-display').textContent;
        navigator.clipboard.writeText(code).then(() => {
          this.textContent = '✅ Copié !';
          setTimeout(() => { this.textContent = '📋 Copier le code'; }, 2000);
        }).catch(() => {
          this.textContent = code;
          setTimeout(() => { this.textContent = '📋 Copier le code'; }, 2000);
        });
      ">📋 Copier le code</button>
    </div>

    <!-- Liste des joueurs -->
    <div class="card">
      <p class="player-count" id="player-count">Chargement…</p>
      <div class="player-list" id="player-list">
        <div class="waiting">
          <div class="spinner"></div>
          <span>En attente des joueurs…</span>
        </div>
      </div>

      <!-- Boutons joueur normal -->
      <div id="player-section">
        <button class="btn btn-primary" id="btn-ready" style="margin-bottom:10px;">
          ✅ Je suis prêt !
        </button>
        <button class="btn btn-secondary" id="btn-leave">
          🚪 Quitter le salon
        </button>
      </div>
    </div>

    <!-- Section meneur (cachée si pas maître) -->
    <div class="card hidden" id="master-section">
      <h2>⚙️ Configuration des rôles</h2>
      <div id="role-counts"></div>
      <div id="role-balance" class="alert alert-info" style="margin-bottom:16px;">
        Ajuste les rôles selon le nombre de joueurs.
      </div>
      <button class="btn btn-green" id="btn-launch">
        🌙 Lancer la partie
      </button>
      <p style="color:var(--text3);font-size:0.85rem;text-align:center;margin-top:10px;font-style:italic;">
        Tu seras redirigé vers la vue meneur. Les joueurs verront leur rôle.
      </p>
    </div>

    <!-- Bouton quitter depuis la vue maître -->
    <div id="master-leave" class="hidden" style="width:100%;max-width:420px;">
      <button class="btn btn-secondary" id="btn-leave-master">
        🚪 Quitter (et fermer le salon)
      </button>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="app.js"></script>
  <script>
    initLobby();

    // Masquer bouton ready pour le maître, afficher bouton quitter maître
    if (sessionStorage.getItem('lgIsMaster') === 'true') {
      document.getElementById('player-section').classList.add('hidden');
      document.getElementById('master-leave').classList.remove('hidden');
      document.getElementById('btn-leave-master').addEventListener('click', async () => {
        if (confirm("Fermer le salon pour tout le monde ?")) {
          const { initFirebase } = window;
          if (typeof firebase !== 'undefined' && firebase.apps.length) {
            const code = sessionStorage.getItem('lgRoomCode');
            await firebase.database().ref(`rooms/${code}`).update({ status: 'ended' });
          }
          sessionStorage.clear();
          window.location.href = 'index.html';
        }
      });
    }
  </script>
</body>
</html>
